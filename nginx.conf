server {
    listen 80;
    listen [::]:80;
    server_name mauriceschulz.dev www.mauriceschulz.dev;

    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mauriceschulz.dev www.mauriceschulz.dev;

    ssl_certificate /etc/nginx/ssl/mauriceschulz.dev.cert;
    ssl_certificate_key /etc/nginx/ssl/mauriceschulz.dev.key;

    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }
}
