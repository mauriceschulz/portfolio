version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-app
    container_name: portfolio-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - portfolio-public:/var/www/html/public
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - portfolio-network
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: portfolio-nginx
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/portfolio/ssl:/etc/nginx/ssl:ro
      - portfolio-public:/var/www/html/public
    networks:
      - portfolio-network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  db-data:
  portfolio-public: